[project]
name = "biautils"
version = "0.2.0"
description = "biautils compute environment for computational microscopy at Chan Zuckerberg Biohub San Francisco"
authors = ["CZ Biohub and iohub contributors <cm-biautils@czbiohub.org>"]
channels = ["conda-forge", "nvidia", "pytorch", "numba", "rapidsai"]
platforms = ["linux-64", "osx-arm64", "win-64"]


[tasks]
env-info = { cmd = "env_info" }
start-napari = { cmd = "napari"}

[system-requirements]

# Core runtime dependencies
[dependencies]
python = "==3.11"

[pypi-dependencies]
biautils = { path = "." }
iohub = { version = ">=0.2.0" }
rich = ">=13.0.0"

# Visualization feature (GUI tools)
[feature.viz]
platforms = ["linux-64", "osx-arm64", "win-64"]

[feature.viz.dependencies]
ffmpeg = "*"

[feature.viz.pypi-dependencies]
napari = { version = ">=0.6.4, <0.7", extras = ["pyqt6"] }
napari-iohub = { git = "https://github.com/czbiohub-sf/napari-iohub" }
napari-ome-zarr = { version = ">=0.6.1" }
napari-animation = { version = ">=0.0.9" }

# ML/AI feature (Linux-only GPU support)
[feature.ml]
platforms = ["linux-64"]
system-requirements = { cuda = "12" }

[feature.ml.dependencies]
scipy = "<1.16"
cupy = "*"
cucim = "*"
pytorch-cuda = "==12.4"
catboost = "*"
scikit-learn = "*"

[feature.ml.pypi-dependencies]
biahub = { git = "https://github.com/czbiohub-sf/biahub" }
ultrack = { git = "https://github.com/royerlab/ultrack" }
waveorder = { version = ">=3.0.0a1", extras = ["all"] }
viscy = ">=0.3.2"

# Test feature
[feature.test.dependencies]
pytest = "*"

[feature.test.tasks]
tests = "pytest tests/"

# Documentation feature
[feature.doc.pypi-dependencies]
jupyter-book = ">=2.0.0b2"

[feature.doc.tasks]
docs-build = "jupyter-book build ."
docs-start = "jupyter-book start ."
docs-pdf = "jupyter-book build --pdf ."

# Environments with solve groups
[environments]
default = { features = ["viz", "ml"], solve-group = "main" }
viz = { features = ["viz"], solve-group = "viz" }
dev = { features = ["viz", "ml", "test", "doc"], solve-group = "main" }
ci = { features = ["test", "doc"], solve-group = "ci" }
